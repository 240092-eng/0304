<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Личный чат — DM System</title>
    <style>
        body { background-color:#ffc0cb; font-family: 'Segoe UI', Arial, sans-serif; display:flex; flex-direction:column; align-items:center; padding:20px; }
        .app-container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 450px; text-align: center; }
        h2 { color:#800040; margin-top: 0; }
        
        #statusInfo { margin-bottom: 15px; font-weight: bold; color: #800040; background: #fff0f5; padding: 10px; border-radius: 10px; }
        
        button { padding:12px 15px; border:none; border-radius:10px; cursor:pointer; font-size:15px; transition: 0.2s; }
        .google-btn { background-color: #4285F4; color: white; width: 100%; font-weight: bold; margin-bottom: 10px; }
        .google-btn:hover { background-color: #357abd; }
        .exit-btn { background-color: #d11a2a; color: white; margin-top: 10px; font-size: 12px; }
        
        #contacts-section { margin-top: 20px; border-top: 2px solid #ffc0cb; padding-top: 15px; text-align: left; }
        .user-link { 
            background: #fff; border: 1.5px solid #800040; color: #800040; 
            width: 100%; margin-bottom: 8px; text-align: center; font-weight: 600;
        }
        .user-link:hover { background: #ffd6e6; }
        .user-link.active { background: #800040 !important; color: white !important; }

        #chatDisplay { 
            border: 2px solid #800040; border-radius: 12px; height: 320px; overflow-y: auto; 
            background-color: #fffafc; padding: 15px; display: flex; flex-direction: column; gap: 10px; margin: 15px 0;
        }
        .msg-bubble { padding: 10px 14px; border-radius: 15px; font-size: 14px; max-width: 85%; word-wrap: break-word; }
        .sent { align-self: flex-end; background-color: #b3e6b3; border: 1px solid #8dbd8d; }
        .received { align-self: flex-start; background-color: #ffd6e6; border: 1px solid #800040; }

        .input-bar { display: flex; gap: 8px; }
        #textInput { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #800040; outline: none; }
        .send-btn { background: #800040; color: white; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Личный чат</h2>
    <div id="statusInfo">Проверка авторизации...</div>
    
    <div id="authBlock">
        <button class="google-btn" onclick="window.googleLogin()">Войти через Google Аккаунт</button>
    </div>
    <button id="exitBtn" class="exit-btn" onclick="window.googleLogout()" style="display:none;">Выйти</button>

    <div id="mainChatUI" style="display:none;">
        <div id="contacts-section">
            <b style="color: #800040;">Выберите собеседника:</b>
            <div id="userButtons" style="margin-top: 10px;"></div>
        </div>

        <div id="chatDisplay">Начните диалог, выбрав пользователя выше</div>

        <div class="input-bar">
            <input id="textInput" placeholder="Напишите сообщение..." autocomplete="off">
            <button class="send-btn" onclick="window.sendData()">➤</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBEp1DrecAiwiAGjUQsR0DOsLHgMlX8PW4",
    authDomain: "chat-app-a4031.firebaseapp.com",
    projectId: "chat-app-a4031",
    storageBucket: "chat-app-a4031.appspot.com",
    messagingSenderId: "949683463039",
    appId: "1:949683463039:web:221d74c75303665329704a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let activeRoom = null;
let stopListening = null;

// Глобальные методы
window.googleLogin = async () => {
    try {
        const res = await signInWithPopup(auth, provider);
        await setDoc(doc(db, "users", res.user.email), {
            email: res.user.email,
            name: res.user.displayName
        });
    } catch (e) { alert("Ошибка входа! Проверьте настройки Google в Firebase."); }
};

window.googleLogout = () => signOut(auth);

window.startChat = (targetEmail, btnElement) => {
    activeRoom = [auth.currentUser.email, targetEmail].sort().join('_');
    
    document.querySelectorAll('.user-link').forEach(b => b.classList.remove('active'));
    btnElement.classList.add('active');

    if (stopListening) stopListening();

    const q = query(collection(db, "dialogs", activeRoom, "messages"), orderBy("createdAt"));
    stopListening = onSnapshot(q, (snapshot) => {
        const box = document.getElementById("chatDisplay");
        box.innerHTML = "";
        snapshot.forEach(d => {
            const m = d.data();
            const div = document.createElement("div");
            div.className = m.user === auth.currentUser.email ? "msg-bubble sent" : "msg-bubble received";
            div.textContent = m.text;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    });
};

window.sendData = async () => {
    const input = document.getElementById("textInput");
    if (!activeRoom || !input.value.trim()) return;
    
    await addDoc(collection(db, "dialogs", activeRoom, "messages"), {
        text: input.value,
        user: auth.currentUser.email,
        createdAt: serverTimestamp()
    });
    input.value = "";
};

// Enter для отправки
document.getElementById("textInput").addEventListener("keypress", (e) => {
    if (e.key === "Enter") window.sendData();
});

// Авторизация
onAuthStateChanged(auth, async (user) => {
    const status = document.getElementById("statusInfo");
    const authBlock = document.getElementById("authBlock");
    const exitBtn = document.getElementById("exitBtn");
    const mainUI = document.getElementById("mainChatUI");
    const userButtons = document.getElementById("userButtons");

    if (user) {
        status.textContent = "Вы вошли: " + user.displayName;
        authBlock.style.display = "none";
        exitBtn.style.display = "block";
        mainUI.style.display = "block";

        const snap = await getDocs(collection(db, "users"));
        userButtons.innerHTML = "";
        snap.forEach(docData => {
            const data = docData.data();
            if (data.email !== user.email) {
                const b = document.createElement("button");
                b.className = "user-link";
                b.textContent = data.name || data.email;
                b.onclick = (e) => window.startChat(data.email, e.target);
                userButtons.appendChild(b);
            }
        });
    } else {
        status.textContent = "Вы не вошли";
        authBlock.style.display = "block";
        exitBtn.style.display = "none";
        mainUI.style.display = "none";
        if (stopListening) stopListening();
    }
});
</script>
</body>
</html>
