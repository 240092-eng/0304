<!DOCTYPE html>
<html>
<head>
  <title>Личный чат</title>
  <style>
    body { background-color:#ffc0cb; font-family:Arial,sans-serif; display:flex; flex-direction:column; align-items:center; padding:20px; }
    h2 { color:#800040; margin-bottom:20px; }
    input { padding:10px; margin:5px 0; border-radius:5px; border:1px solid #800040; width:250px; font-size:16px; }
    button { padding:10px 20px; margin:5px; border:none; border-radius:5px; background-color:#800040; color:#fff; cursor:pointer; font-size:16px; transition:0.3s; }
    button:hover { background-color:#a00060; }
    hr { width:80%; margin:20px 0; border:1px solid #800040; }
    #chat { border:2px solid #800040; border-radius:10px; padding:10px; width:300px; height:300px; overflow-y:auto; background-color:#ffe6f0; margin-bottom:10px; }
    #chat div { margin:5px 0; padding:5px; border-radius:5px; background-color:#ffd6e6; }
    #users { margin-bottom:10px; }
    #users button { width: 300px; text-align: left; }
    #currentUser { margin-bottom: 10px; font-weight: bold; }
  </style>
</head>
<body>

<h2>Личный чат</h2>

<div id="currentUser">Вы не вошли</div>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Пароль"><br>
<button onclick="register()">Регистрация</button>
<button onclick="login()">Вход</button>
<button onclick="logout()" style="background:#cc3366; margin-left:10px;">Выйти</button>

<hr>

<div id="users">
  <b>Выберите собеседника:</b><br>
</div>

<div id="chat"></div>

<input id="message" placeholder="Сообщение">
<button onclick="sendCurrentMessage()">Отправить</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ======= Конфиг Firebase =======
const firebaseConfig = {
  apiKey: "AIzaSyBEp1DrecAiwiAGjUQsR0DOsLHgMlX8PW4",
  authDomain: "chat-app-a4031.firebaseapp.com",
  projectId: "chat-app-a4031",
  storageBucket: "chat-app-a4031.appspot.com",
  messagingSenderId: "949683463039",
  appId: "1:949683463039:web:221d74c75303665329704a",
  measurementId: "G-PH0GQ0NEVC"
};
// ===============================

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let currentDialogId = null;
let unsubscribeFromMessages = null;

const userListElem = document.getElementById("users");
const chatElem = document.getElementById("chat");
const currentUserElem = document.getElementById("currentUser");

// ======== Загрузка пользователей из Firestore ========
async function loadUsers() {
  const snapshot = await getDocs(collection(db, "users"));
  const users = [];
  snapshot.forEach(doc => {
    const data = doc.data();
    if (data.email && data.email !== currentUser.email) {
      users.push(data.email);
    }
  });
  updateUserList(users);
}

function updateUserList(users) {
  userListElem.innerHTML = "<b>Выберите собеседника:</b><br>";
  users.forEach(email => {
    const btn = document.createElement("button");
    btn.textContent = email;
    btn.onclick = () => selectDialog(email);
    userListElem.appendChild(btn);
  });
}

// ======== Работа с диалогом ========
function getDialogId(user1, user2) {
  return [user1, user2].sort().join('_');
}

function selectDialog(otherUserEmail) {
  if (!currentUser) return alert("Сначала войдите!");
  currentDialogId = getDialogId(currentUser.email, otherUserEmail);

  if (unsubscribeFromMessages) unsubscribeFromMessages();

  const messagesQuery = query(
    collection(db, "dialogs", currentDialogId, "messages"),
    orderBy("createdAt")
  );

  unsubscribeFromMessages = onSnapshot(messagesQuery, snapshot => {
    chatElem.innerHTML = "";
    snapshot.forEach(doc => {
      const m = doc.data();
      const div = document.createElement("div");
      div.textContent = m.text;
      div.style.backgroundColor = m.user === currentUser.email ? "#b3e6b3" : "#ffd6e6";
      div.style.textAlign = m.user === currentUser.email ? "right" : "left";
      chatElem.appendChild(div);
    });
    chatElem.scrollTop = chatElem.scrollHeight;
  });
}

async function sendCurrentMessage() {
  const textElem = document.getElementById("message");
  const text = textElem.value.trim();

  if (!currentUser) return alert("Сначала войдите!");
  if (!currentDialogId) return alert("Выберите собеседника!");
  if (!text) return;

  try {
    await addDoc(collection(db, "dialogs", currentDialogId, "messages"), {
      text,
      user: currentUser.email,
      createdAt: serverTimestamp()
    });
    textElem.value = "";
  } catch(err) {
    alert("Ошибка отправки: " + err.message);
  }
}

// ======== Регистрация, вход, выход ========
window.register = async () => {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  try {
    await createUserWithEmailAndPassword(auth, email, password);
    await addDoc(collection(db, "users"), { email });
    alert("Аккаунт создан!");
  } catch(err) {
    if (err.code === "auth/email-already-in-use") {
      alert("Этот email уже зарегистрирован! Попробуйте войти.");
    } else {
      alert("Ошибка регистрации: " + err.message);
    }
  }
};

window.login = async () => {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
    alert("Вход выполнен!");
  } catch(err) {
    alert("Ошибка входа: " + err.message);
  }
};

window.logout = async () => {
  try {
    await signOut(auth);
    alert("Вы вышли из аккаунта.");
  } catch(err) {
    alert("Ошибка выхода: " + err.message);
  }
};

// ======== Отслеживание состояния входа ========
onAuthStateChanged(auth, user => {
  currentUser = user;
  if (user) {
    currentUserElem.textContent = "Вы вошли: " + user.email;
    loadUsers(); // загружаем список собеседников
  } else {
    currentUserElem.textContent = "Вы не вошли";
    chatElem.innerHTML = "";
    currentDialogId = null;
    if (unsubscribeFromMessages) unsubscribeFromMessages();
  }
});
</script>

</body>
</html>
